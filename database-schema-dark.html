<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1040" viewBox="0 0 2600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Esquema de la base de datos proyecto_final.db</title>
  <desc id="desc">Diagrama horizontal de las seis tablas SQLite y sus relaciones.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8be9fd"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .title { fill: #f8f8f2; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #a9b7c6; font-size: 18px; }
      .box { fill: #172238; fill-opacity: .96; stroke: #637a9a; stroke-width: 2; }
      .head-device { fill: #155e75; }
      .head-maint { fill: #5b3c88; }
      .head-insp { fill: #8a4b20; }
      .head-task { fill: #245c43; }
      .head-item { fill: #8b3458; }
      .head-photo { fill: #4c617c; }
      .table { fill: #ffffff; font-size: 22px; font-weight: 700; }
      .field { fill: #edf2f7; font-size: 19px; }
      .key { fill: #f1fa8c; font-size: 18px; font-weight: 700; }
      .note { fill: #a9b7c6; font-size: 16px; }
      .line { stroke: #8be9fd; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #bd93f9; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line3 { stroke: #ffb86c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { fill: #f8f8f2; font-size: 17px; font-weight: 600; }
      .legend { fill: #cbd5e1; font-size: 17px; }
    </style>
  </defs>

  <text x="40" y="56" class="title">proyecto_final.db — esquema relacional</text>
  <text x="40" y="87" class="subtitle">SQLite · DATABASE_VERSION 5 · fondo transparente para presentación oscura</text>

  <!-- Relaciones principales, trazadas detrás de las tablas -->
  <path class="line" d="M 390 340 C 420 340, 410 340, 440 340"/>
  <text x="396" y="320" class="label">1 : N</text>
  <text x="366" y="365" class="note">dispositivo_id</text>

  <path class="line" d="M 830 340 C 860 340, 850 340, 880 340"/>
  <text x="836" y="320" class="label">1 : N</text>

  <path class="line" d="M 1270 340 C 1300 340, 1290 340, 1320 340"/>
  <text x="1276" y="320" class="label">1 : N</text>
  <text x="1240" y="365" class="note">dispositivo_id</text>

  <path class="line" d="M 1700 340 C 1730 340, 1720 340, 1750 340"/>
  <text x="1706" y="320" class="label">1 : N</text>
  <text x="1690" y="365" class="note">tarea_id</text>

  <path class="line" d="M 2120 340 C 2150 340, 2140 340, 2170 340"/>
  <text x="2126" y="320" class="label">1 : N</text>
  <text x="2100" y="365" class="note">tarea_id</text>

  <!-- Enlaces del item a sus fuentes: exactamente uno debe existir -->
  <path class="line2" d="M 1910 590 C 1880 880, 650 900, 640 590"/>
  <text x="1060" y="917" class="label">tipo = mantenimiento → mantenimiento_id</text>
  <path class="line3" d="M 1950 590 C 1930 800, 1120 820, 1080 590"/>
  <text x="1340" y="837" class="label">tipo = inspeccion → inspeccion_id</text>

  <!-- dispositivos -->
  <g transform="translate(40,150)">
    <rect class="box" width="350" height="440" rx="18"/>
    <path class="head-device" d="M18 0 H332 A18 18 0 0 1 350 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">DISPOSITIVOS</text>
    <text x="24" y="108" class="field">id</text><text x="270" y="108" class="key">PK</text>
    <text x="24" y="153" class="field">nombre</text>
    <text x="24" y="198" class="field">categoria</text>
    <text x="24" y="243" class="field">marca</text>
    <text x="24" y="288" class="field">modelo</text>
    <text x="24" y="333" class="field">foto</text>
    <line x1="20" y1="362" x2="330" y2="362" stroke="#637a9a"/>
    <text x="24" y="398" class="note">id INTEGER AUTOINCREMENT</text>
  </g>

  <!-- mantenimientos -->
  <g transform="translate(440,150)">
    <rect class="box" width="390" height="440" rx="18"/>
    <path class="head-maint" d="M18 0 H372 A18 18 0 0 1 390 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">MANTENIMIENTOS</text>
    <text x="24" y="108" class="field">id</text><text x="304" y="108" class="key">PK</text>
    <text x="24" y="153" class="field">nombre</text>
    <text x="24" y="198" class="field">descripcion</text>
    <text x="24" y="243" class="field">fecha</text>
    <text x="24" y="288" class="field">repetir_cada</text>
    <text x="24" y="333" class="field">dispositivo_id</text><text x="304" y="333" class="key">FK</text>
    <line x1="20" y1="362" x2="370" y2="362" stroke="#637a9a"/>
    <text x="24" y="398" class="note">ON DELETE CASCADE</text>
  </g>

  <!-- inspecciones -->
  <g transform="translate(880,150)">
    <rect class="box" width="390" height="440" rx="18"/>
    <path class="head-insp" d="M18 0 H372 A18 18 0 0 1 390 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">INSPECCIONES</text>
    <text x="24" y="108" class="field">id</text><text x="304" y="108" class="key">PK</text>
    <text x="24" y="153" class="field">nombre</text>
    <text x="24" y="198" class="field">descripcion</text>
    <text x="24" y="243" class="field">fecha</text>
    <text x="24" y="288" class="field">repetir_cada</text>
    <text x="24" y="333" class="field">dispositivo_id</text><text x="304" y="333" class="key">FK</text>
    <line x1="20" y1="362" x2="370" y2="362" stroke="#637a9a"/>
    <text x="24" y="398" class="note">ON DELETE CASCADE</text>
  </g>

  <!-- tareas -->
  <g transform="translate(1320,150)">
    <rect class="box" width="380" height="440" rx="18"/>
    <path class="head-task" d="M18 0 H362 A18 18 0 0 1 380 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">TAREAS</text>
    <text x="24" y="108" class="field">id</text><text x="294" y="108" class="key">PK</text>
    <text x="24" y="153" class="field">dispositivo_id</text><text x="294" y="153" class="key">FK</text>
    <text x="24" y="198" class="field">fecha</text>
    <text x="24" y="243" class="field">completada</text>
    <text x="24" y="288" class="field">fecha_completada</text>
    <line x1="20" y1="330" x2="360" y2="330" stroke="#637a9a"/>
    <text x="24" y="370" class="note">Agrupa items por fecha</text>
    <text x="24" y="402" class="note">y dispositivo pendiente</text>
  </g>

  <!-- tarea_items -->
  <g transform="translate(1750,150)">
    <rect class="box" width="370" height="440" rx="18"/>
    <path class="head-item" d="M18 0 H352 A18 18 0 0 1 370 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">TAREA_ITEMS</text>
    <text x="24" y="104" class="field">id</text><text x="286" y="104" class="key">PK</text>
    <text x="24" y="143" class="field">tarea_id</text><text x="286" y="143" class="key">FK</text>
    <text x="24" y="182" class="field">tipo</text>
    <text x="24" y="221" class="field">mantenimiento_id</text><text x="286" y="221" class="key">FK</text>
    <text x="24" y="260" class="field">inspeccion_id</text><text x="286" y="260" class="key">FK</text>
    <text x="24" y="299" class="field">notas</text>
    <text x="24" y="338" class="field">condicion</text>
    <text x="24" y="377" class="field">completada</text>
    <line x1="20" y1="396" x2="350" y2="396" stroke="#637a9a"/>
    <text x="24" y="425" class="note">CHECK: una fuente obligatoria</text>
  </g>

  <!-- tarea_fotos -->
  <g transform="translate(2170,150)">
    <rect class="box" width="360" height="440" rx="18"/>
    <path class="head-photo" d="M18 0 H342 A18 18 0 0 1 360 18 V68 H0 V18 A18 18 0 0 1 18 0Z"/>
    <text x="24" y="43" class="table">TAREA_FOTOS</text>
    <text x="24" y="108" class="field">id</text><text x="276" y="108" class="key">PK</text>
    <text x="24" y="153" class="field">tarea_id</text><text x="276" y="153" class="key">FK</text>
    <text x="24" y="198" class="field">ruta</text>
    <text x="24" y="243" class="field">fecha_creacion</text>
    <line x1="20" y1="282" x2="340" y2="282" stroke="#637a9a"/>
    <text x="24" y="322" class="note">UNIQUE:</text>
    <text x="24" y="351" class="note">tarea_id + ruta</text>
    <text x="24" y="398" class="note">ON DELETE CASCADE</text>
  </g>

  <line x1="40" y1="968" x2="620" y2="968" stroke="#f1fa8c" stroke-width="4"/>
  <text x="635" y="975" class="legend">PK = clave primaria</text>
  <line x1="900" y1="968" x2="1480" y2="968" stroke="#8be9fd" stroke-width="4"/>
  <text x="1495" y="975" class="legend">FK = clave foránea · todas usan ON DELETE CASCADE</text>
</svg>
